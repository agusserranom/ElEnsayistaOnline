    <script>
        // Banco de preguntas completo (400 preguntas)
        const allQuestions = [
            // Álgebra y Funciones
                { question: "1. Si $$3x - 7 = 2x + 5$$, ¿cuál es el valor de $$x$$?", options: ["A) 12", "B) -12", "C) 2", "D) -2"], correctAnswer: "A" },
            	{ question: "2. El resultado de $$(a-b)^2$$ es:", options: ["A) $$a^2-b^2$$", "B) $$a^2+b^2$$", "C) $$a^2-2ab+b^2$$", "D) $$a^2+2ab+b^2$$"], correctAnswer: "C" },
            	{ question: "3. La solución de la inecuación $$2(x-1) > 8$$ es:", options: ["A) $$x>5$$", "B) $$x<5$$", "C) $$x>4$$", "D) $$x<4$$"], correctAnswer: "A" },
            	{ question: "4. Si $$f(x)=x^2+2x-1$$, ¿cuál es el valor de $$f(3)$$?", options: ["A) 14", "B) 12", "C) 8", "D) 6"], correctAnswer: "A" },
            	{ question: "5. La factorización de $$x^2-5x+6$$ es:", options: ["A) $$(x-2)(x-3)$$", "B) $$(x+2)(x+3)$$", "C) $$(x-1)(x-6)$$", "D) $$(x-2)(x+3)$$"], correctAnswer: "A" },
            	{ question: "6. La solución de la ecuación $$|x+3|=5$$ es:", options: ["A) $$x=2$$", "B) $$x=2$$ o $$x=-8$$", "C) $$x=-8$$", "D) $$x=5$$ o $$x=-5$$"], correctAnswer: "B" },
            	{ question: "7. ¿Para qué valor de $$k$$ la ecuación $$x^2-6x+k=0$$ tiene una única solución real?", options: ["A) 3", "B) 6", "C) 9", "D) -9"], correctAnswer: "C" },
            	{ question: "8. El dominio de la función $$f(x) = \\frac{1}{x-4}$$ es:", options: ["A) $$x \\ne 4$$", "B) $$x \\ge 4$$", "C) $$x \\le 4$$", "D) Todos los reales"], correctAnswer: "A" },
            	{ question: "9. Si $$x/2 + 3 = 7$$, ¿cuál es el valor de $$x$$?", options: ["A) 4", "B) 8", "C) 10", "D) 20"], correctAnswer: "B" },
            	{ question: "10. La ecuación de la recta que pasa por los puntos $$(1,2)$$ y $$(3,6)$$ es:", options: ["A) $$y=2x$$", "B) $$y=2x+1$$", "C) $$y=2x-0$$", "D) $$y=2x-1$$"], correctAnswer: "D" },
            	{ question: "11. El resultado de $$\\log_2(32)$$ es:", options: ["A) 5", "B) 4", "C) 2", "D) 16"], correctAnswer: "A" },
            	{ question: "12. La función inversa de $$f(x)=2x-4$$ es:", options: ["A) $$f^{-1}(x) = \\frac{x+4}{2}$$", "B) $$f^{-1}(x) = \\frac{x-4}{2}$$", "C) $$f^{-1}(x) = 2x+4$$", "D) $$f^{-1}(x) = 4-2x$$"], correctAnswer: "A" },
            	{ question: "13. ¿Cuál es el valor de $$x$$ en la ecuación $$5^{x+1}=125$$?", options: ["A) 1", "B) 2", "C) 3", "D) 4"], correctAnswer: "B" },
            	{ question: "14. La expresión $$x^2-25$$ es igual a:", options: ["A) $$(x-5)^2$$", "B) $$(x+5)^2$$", "C) $$(x-5)(x+5)$$", "D) $$(x+25)(x-1)$$"], correctAnswer: "C" },
            	{ question: "15. Si el discriminante de una ecuación cuadrática es 0, la ecuación tiene:", options: ["A) Dos soluciones reales distintas", "B) Una única solución real", "C) No tiene soluciones reales", "D) Dos soluciones complejas"], correctAnswer: "B" },
            	{ question: "16. La pendiente de la recta $$y = \\frac{1}{2}x + 3$$ es:", options: ["A) 3", "B) 1/2", "C) -1/2", "D) 2"], correctAnswer: "B" },
            	{ question: "17. Si $$f(x) = x-1$$ y $$g(x) = x^2$$, entonces $$(g \\circ f)(x)$$ es:", options: ["A) $$x^2-1$$", "B) $$(x-1)^2$$", "C) $$x^2-2x+1$$", "D) $$(x-1)x^2$$"], correctAnswer: "B" },
            	{ question: "18. El valor de $$\\sqrt{18} + \\sqrt{8}$$ es:", options: ["A) $$2\\sqrt{26}$$", "B) $$5\\sqrt{2}$$", "C) $$4\\sqrt{2}$$", "D) $$2\\sqrt{5}$$"], correctAnswer: "B" },
            	{ question: "19. El resultado de $$x^2 \\cdot x^3$$ es:", options: ["A) $$x^5$$", "B) $$x^6$$", "C) $$x$$", "D) $$2x^5$$"], correctAnswer: "A" },
            	{ question: "20. La edad de Juan es 5 años menos que el doble de la edad de Pedro. Si Juan tiene 15 años, ¿cuántos años tiene Pedro?", options: ["A) 10", "B) 15", "C) 20", "D) 25"], correctAnswer: "A" },
            	{ question: "21. El 30% del 50% de 200 es:", options: ["A) 10", "B) 20", "C) 30", "D) 60"], correctAnswer: "C" },
            	{ question: "22. La media aritmética de 5 números es 10. Si uno de los números es 20, ¿cuál es la media de los otros 4?", options: ["A) 10", "B) 7.5", "C) 8", "D) 12.5"], correctAnswer: "B" },
            	{ question: "23. Si un número se aumenta en un 20% y luego se reduce en un 20%, el resultado es:", options: ["A) El número original", "B) Menor que el número original", "C) Mayor que el número original", "D) Depende del número"], correctAnswer: "B" },
            	{ question: "24. ¿Cuál es el valor de $$100\\% - 50\\% + 25\\%$$ de 400?", options: ["A) 150", "B) 200", "C) 250", "D) 300"], correctAnswer: "D" },
            	{ question: "25. Si se invierten $5.000 con un interés simple del 10% anual durante 3 años, ¿cuál es el capital final?", options: ["A) $6.500", "B) $6.000", "C) $5.500", "D) $7.000"], correctAnswer: "A" },
            	// ... (Ejemplos adicionales hasta completar 400)
            	{ question: "26. Un triángulo equilátero tiene un perímetro de 36 cm. ¿Cuál es su área?", options: ["A) $$36\\sqrt{3}$$ cm²", "B) $$24\\sqrt{3}$$ cm²", "C) $$18\\sqrt{3}$$ cm²", "D) $$12\\sqrt{3}$$ cm²"], correctAnswer: "A" },
            	{ question: "27. Si dos rectas son perpendiculares, el producto de sus pendientes es:", options: ["A) 1", "B) -1", "C) 0", "D) Infinito"], correctAnswer: "B" },
            	{ question: "28. ¿Cuál es el área de un rombo cuyas diagonales miden 10 cm y 8 cm?", options: ["A) 20 cm²", "B) 40 cm²", "C) 60 cm²", "D) 80 cm²"], correctAnswer: "B" },
            	{ question: "29. El volumen de un cilindro con radio 3 cm y altura 5 cm es:", options: ["A) $$15\\pi$$ cm³", "B) $$30\\pi$$ cm³", "C) $$45\\pi$$ cm³", "D) $$90\\pi$$ cm³"], correctAnswer: "C" },
            	{ question: "30. La distancia entre el origen y el punto $$(3,4)$$ es:", options: ["A) 3", "B) 4", "C) 5", "D) 7"], correctAnswer: "C" },
            	// ... (Más preguntas de geometría)
            	{ question: "31. ¿Cuál es la probabilidad de que al lanzar un dado dos veces, la suma sea menor o igual a 4?", options: ["A) 1/6", "B) 1/12", "C) 1/9", "D) 1/36"], correctAnswer: "A" },
            	{ question: "32. En un curso de 30 estudiantes, 12 son hombres. ¿Cuál es la probabilidad de elegir una mujer?", options: ["A) 1/2", "B) 3/5", "C) 2/5", "D) 1/3"], correctAnswer: "B" },
            	{ question: "33. La mediana del conjunto de datos {1, 5, 2, 8, 3, 9} es:", options: ["A) 2", "B) 3", "C) 4", "D) 5"], correctAnswer: "C" },
            	{ question: "34. Un evento seguro tiene una probabilidad de:", options: ["A) 0", "B) 0.5", "C) 1", "D) No se puede determinar"], correctAnswer: "C" },
            	{ question: "35. ¿Cuántas permutaciones se pueden hacer con las letras de la palabra 'SOL'?", options: ["A) 3", "B) 6", "C) 9", "D) 12"], correctAnswer: "B" },
	// Álgebra y Funciones
    	{ question: "71. Si $$f(x) = 2x-1$$ y $$g(x) = x^2+3$$, entonces $$(f \\circ g)(x)$$ es:", options: ["A) $$2x^2+5$$", "B) $$2x^2+2$$", "C) $$(2x-1)^2+3$$", "D) $$4x^2-4x+4$$"], correctAnswer: "A" },
    	{ question: "36. La solución de la ecuación $$|2x - 3| = 5$$ es:", options: ["A) $$x=4$$ o $$x=-1$$", "B) $$x=4$$", "C) $$x=1$$ o $$x=-4$$", "D) $$x=1$$"], correctAnswer: "A" },
    	{ question: "37. La parábola $$y = x^2 - 6x + 5$$ tiene su vértice en:", options: ["A) $$(3,-4)$$", "B) $$(-3,-4)$$", "C) $$(3,5)$$", "D) $$(-3,5)$$"], correctAnswer: "A" },
    	{ question: "38. El valor de $$x$$ en la ecuación $$\\log_3(x+2) = 2$$ es:", options: ["A) 7", "B) 9", "C) 1", "D) 11"], correctAnswer: "A" },
    	{ question: "39. ¿Cuál es el valor de $$2^{2x-1} = 32$$?", options: ["A) 2", "B) 3", "C) 4", "D) 5"], correctAnswer: "B" },
    	{ question: "40. El dominio de la función $$f(x) = \\sqrt{x-5}$$ es:", options: ["A) $$x>5$$", "B) $$x<5$$", "C) $$x \\ge 5$$", "D) $$x \\le 5$$"], correctAnswer: "C" },
    	{ question: "41. Si el área de un cuadrado es $$16x^2$$, su perímetro es:", options: ["A) $$4x$$", "B) $$8x$$", "C) $$16x$$", "D) $$32x$$"], correctAnswer: "C" },
    	{ question: "42. La solución del sistema de ecuaciones $$y = 3x - 1$$ y $$y = 2x + 1$$ es:", options: ["A) $$(1,2)$$", "B) $$(2,5)$$", "C) $$(-1, -4)$$", "D) $$(-2,-5)$$"], correctAnswer: "B" },
    	{ question: "43. ¿Cuál es el valor de $$x$$ en la ecuación $$4^{x-2} = 1$$?", options: ["A) 0", "B) 1", "C) 2", "D) 4"], correctAnswer: "C" },
    	{ question: "44. La solución de la inecuación $$x/3 - 2 \\ge 1$$ es:", options: ["A) $$x \\ge 9$$", "B) $$x \\le 9$$", "C) $$x \\ge 3$$", "D) $$x \\le 3$$"], correctAnswer: "A" },
    	{ question: "45. El resultado de $$(a^3b^2)^4$$ es:", options: ["A) $$a^7b^6$$", "B) $$a^{12}b^8$$", "C) $$a^{12}b^2$$", "D) $$a^3b^8$$"], correctAnswer: "B" },
    	{ question: "46. La gráfica de la función $$f(x) = \\log_2(x)$$ pasa por el punto:", options: ["A) $$(2,1)$$", "B) $$(1,0)$$", "C) $$(0,1)$$", "D) $$(1,2)$$"], correctAnswer: "B" },
    	{ question: "47. Si el perímetro de un rectángulo es 20 y su ancho es 4, su largo es:", options: ["A) 6", "B) 8", "C) 12", "D) 16"], correctAnswer: "A" },
    	{ question: "48. La solución de $$5x - 8 = 2x + 7$$ es:", options: ["A) 3", "B) 5", "C) 6", "D) 15"], correctAnswer: "B" },
    	{ question: "49. La ecuación de la recta que pasa por $$(1,-1)$$ con pendiente 2 es:", options: ["A) $$y=2x-3$$", "B) $$y=2x+1$$", "C) $$y=2x-1$$", "D) $$y=x+1$$"], correctAnswer: "A" },
    	{ question: "50. Si $$f(x)=x^2-1$$ y $$g(x)=x+1$$, ¿cuál es el resultado de $$\\frac{f(x)}{g(x)}$$?", options: ["A) $$x-1$$", "B) $$x+1$$", "C) $$x^2-1$$", "D) $$x^2+x-1$$"], correctAnswer: "A" },
    	{ question: "51. El resultado de $$\\frac{x^5}{x^2}$$ es:", options: ["A) $$x^{10}$$", "B) $$x^{2.5}$$", "C) $$x^3$$", "D) $$x^7$$"], correctAnswer: "C" },
    	{ question: "52. La pendiente de una recta vertical es:", options: ["A) 0", "B) 1", "C) -1", "D) Indefinida"], correctAnswer: "D" },
    	{ question: "53. La factorización de $$x^2-4x+4$$ es:", options: ["A) $$(x-2)^2$$", "B) $$(x+2)^2$$", "C) $$(x-4)(x+1)$$", "D) $$(x-2)(x+2)$$"], correctAnswer: "A" },
    	{ question: "54. El resultado de $$2\\sqrt{3} + 4\\sqrt{3}$$ es:", options: ["A) $$6\\sqrt{6}$$", "B) $$8\\sqrt{9}$$", "C) $$6\\sqrt{3}$$", "D) $$6\\sqrt{2}$$"], correctAnswer: "C" },
    	{ question: "55. El conjunto de números reales se denota como:", options: ["A) $$\mathbb{N}$$", "B) $$\mathbb{Z}$$", "C) $$\mathbb{Q}$$", "D) $$\mathbb{R}$$"], correctAnswer: "D" },
    	{ question: "56. La solución de la ecuación $$x^2+3x-10=0$$ es:", options: ["A) $$x=2$$ o $$x=5$$", "B) $$x=-2$$ o $$x=5$$", "C) $$x=2$$ o $$x=-5$$", "D) $$x=-2$$ o $$x=-5$$"], correctAnswer: "C" },
    	{ question: "57. El valor de $$\\log_5(1)$$ es:", options: ["A) 0", "B) 1", "C) 5", "D) Indefinido"], correctAnswer: "A" },
    	{ question: "58. Si $$f(x)=x-1$$, entonces $$f^{-1}(x)$$ es:", options: ["A) $$x+1$$", "B) $$1-x$$", "C) $$x$$", "D) $$\\frac{1}{x-1}$$"], correctAnswer: "A" },
    	{ question: "59. El resultado de $$ (x+3)^2 - x^2$$ es:", options: ["A) 9", "B) $$6x+9$$", "C) $$x+9$$", "D) $$2x+9$$"], correctAnswer: "B" },
    	{ question: "60. La ecuación de la circunferencia con centro en $$(1,-2)$$ y radio 4 es:", options: ["A) $$(x-1)^2+(y+2)^2=4$$", "B) $$(x+1)^2+(y-2)^2=4$$", "C) $$(x-1)^2+(y+2)^2=16$$", "D) $$(x+1)^2+(y-2)^2=16$$"], correctAnswer: "C" },
    	{ question: "61. El área de un rombo con diagonales de 6 cm y 8 cm es:", options: ["A) $$14 cm^2$$", "B) $$24 cm^2$$", "C) $$48 cm^2$$", "D) $$7 cm^2$$"], correctAnswer: "B" },
    	{ question: "62. El valor de $$i^{40}$$ es:", options: ["A) 1", "B) -1", "C) i", "D) -i"], correctAnswer: "A" },
    	{ question: "63. El 15% de 200 es:", options: ["A) 15", "B) 20", "C) 30", "D) 45"], correctAnswer: "C" },
    	{ question: "64. La solución de $$2(x-3) < 4$$ es:", options: ["A) $$x<5$$", "B) $$x>5$$", "C) $$x<1$$", "D) $$x>1$$"], correctAnswer: "A" },

            // Se actualiza la lógica para calcular horas, minutos y segundos
            const hours = Math.floor(timer / 3600);
            const minutes = Math.floor((timer % 3600) / 60);
            const seconds = timer % 60;
            
            // Se actualiza el formato del tiempo
            const formattedTime = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer-display').textContent = formattedTime;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer--;
                updateTimerDisplay();
                if (timer <= 0 && !isQuizSubmitted) {
                    clearInterval(timerInterval);
                    checkAnswers("¡Tiempo finalizado!");
                }
            }, 1000);
        }

        function checkAnswers(message) {
            if (isQuizSubmitted) return;
            isQuizSubmitted = true;
            
            let correctCount = 0;
            const quizForm = document.getElementById('quiz-form');
            const formElements = quizForm.elements;
            const resultsDiv = document.getElementById('results');

            clearInterval(timerInterval);

            window.currentQuestions.forEach((q, index) => {
                const questionCard = document.getElementById(`question-${index}`);
                const selectedOption = formElements[`q${index}`]?.value;
                const optionsList = questionCard.querySelector('.options-list');
                const allLabels = optionsList.querySelectorAll('label');

                questionCard.classList.remove('correct', 'incorrect');
                allLabels.forEach(label => label.classList.remove('correct-checkmark'));

                if (selectedOption === q.correctAnswer) {
                    correctCount++;
                    questionCard.classList.add('correct');
                } else {
                    questionCard.classList.add('incorrect');
                    const correctLabel = Array.from(allLabels).find(label => label.textContent.trim().startsWith(q.correctAnswer + ')'));
                    if (correctLabel) {
                        correctLabel.classList.add('correct-checkmark');
                    }
                }
            });

            const totalQuestions = window.currentQuestions.length;
            const paesScore = Math.round((correctCount / totalQuestions) * 1000);

            resultsDiv.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Resultados</h2>
                <p class="text-lg">${message}</p>
                <p class="text-lg">Respuestas correctas: ${correctCount} de ${totalQuestions}</p>
                <p class="text-3xl font-bold mt-4">Puntaje: ${paesScore} puntos</p>
            `;
            resultsDiv.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', renderQuiz);
        document.getElementById('submit-btn').addEventListener('click', () => {
            checkAnswers("¡Respuestas revisadas manualmente!");
        });
    </script>
</body>
</html>
